<div class="flex flex-col h-dvh overflow-hidden bg-slate-50 dark:bg-slate-900 transition-colors duration-200">

  <main class="flex-1 overflow-y-auto">
    <router-outlet />
  </main>

  <!-- Toast -->
  @if (toast.toast()) {
    <div class="fixed bottom-24 left-4 right-4 z-50 toast-enter pointer-events-none">
      <div class="rounded-2xl px-4 py-3 text-sm font-medium text-white shadow-lg flex items-center gap-2"
           [class]="toast.toast()!.type === 'error' ? 'bg-red-500' :
                    toast.toast()!.type === 'success' ? 'bg-emerald-500' : 'bg-slate-700'">
        <span class="material-icons-round text-base">
          {{ toast.toast()!.type === 'error' ? 'error' : toast.toast()!.type === 'success' ? 'check_circle' : 'info' }}
        </span>
        {{ toast.toast()!.text }}
      </div>
    </div>
  }

  <!-- Bottom nav (4 items) -->
  @if (showNav()) {
    <nav class="bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 shadow-[0_-1px_12px_rgba(0,0,0,0.06)] pb-safe flex-shrink-0">
      <div class="flex">
        @for (item of nav; track item.path) {
          <a [routerLink]="item.path" routerLinkActive="active-nav"
             class="flex-1 flex flex-col items-center justify-center py-3 gap-0.5 text-slate-400 no-underline transition-colors duration-150 nav-link">
            <span class="material-icons-round text-2xl leading-none">{{ item.icon }}</span>
            <span class="text-[10px] font-medium">{{ item.label }}</span>
          </a>
        }
      </div>
    </nav>
  }
</div>
