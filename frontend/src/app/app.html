<div class="flex flex-col h-dvh overflow-hidden transition-colors duration-500"
     [style.background]="theme.bgGradient()">

  <main class="flex-1 overflow-y-auto">
    <router-outlet />
  </main>

  <!-- Toast -->
  @if (toast.toast()) {
    <div class="fixed bottom-24 left-4 right-4 z-50 toast-enter pointer-events-none">
      <div class="rounded-2xl px-4 py-3.5 text-sm font-semibold text-white shadow-xl flex items-center gap-2"
           style="backdrop-filter:blur(16px)"
           [style.background]="toast.toast()!.type === 'error' ? 'rgba(239,68,68,0.92)' :
                               toast.toast()!.type === 'success' ? 'rgba(16,185,129,0.92)' : 'rgba(51,65,85,0.92)'">
        <span class="material-icons-round text-base">
          {{ toast.toast()!.type === 'error' ? 'error' : toast.toast()!.type === 'success' ? 'check_circle' : 'info' }}
        </span>
        {{ toast.toast()!.text }}
      </div>
    </div>
  }

  <!-- Bottom nav — glass -->
  @if (showNav()) {
    <nav class="border-t pb-safe flex-shrink-0 transition-colors duration-300"
         style="backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%)"
         [style.background]="theme.navBg()"
         [style.border-color]="theme.isDark() ? 'rgba(255,255,255,0.07)' : 'rgba(255,255,255,0.6)'">
      <div class="flex">
        @for (item of nav; track item.path) {
          <a [routerLink]="item.path" routerLinkActive="active-nav"
             class="flex-1 flex flex-col items-center justify-center py-3 gap-0.5 text-slate-400 no-underline transition-all duration-200 nav-link">
            <span class="material-icons-round text-2xl leading-none transition-all duration-200">{{ item.icon }}</span>
            <span class="text-[10px] font-semibold tracking-wide">{{ item.label }}</span>
          </a>
        }
      </div>
    </nav>
  }
</div>
