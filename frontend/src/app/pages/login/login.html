<div class="min-h-screen flex flex-col items-center justify-center px-6 py-10"
     [style.background]="theme.headerGradient()">

  <!-- Logo -->
  <div class="w-20 h-20 rounded-3xl bg-white/20 backdrop-blur-sm flex items-center justify-center mb-4 shadow-lg">
    <span class="material-icons-round text-white" style="font-size:40px">monitor_heart</span>
  </div>
  <h1 class="text-3xl font-bold text-white mb-1">DiaBetis</h1>
  <p class="text-white/70 text-sm mb-8">Gestión inteligente de insulina</p>

  @if (loading()) {
    <div class="flex justify-center py-8">
      <div class="w-8 h-8 spinner"></div>
    </div>
  } @else {
    <div class="w-full max-w-sm bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-8">
      <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-1">Iniciar sesión</h2>
      <p class="text-slate-400 text-sm mb-6">Introduce tus credenciales</p>

      <label class="label">Usuario</label>
      <input type="text" autocomplete="username" class="input-field mb-3"
        placeholder="nombre de usuario"
        [ngModel]="username()" (ngModelChange)="username.set($event)"
        (keydown.enter)="loginWithPassword()" />

      <label class="label">Contraseña</label>
      <div class="relative mb-6">
        <input [type]="showPass() ? 'text' : 'password'" autocomplete="current-password"
          class="input-field pr-11"
          placeholder="••••••••"
          [ngModel]="password()" (ngModelChange)="password.set($event)"
          (keydown.enter)="loginWithPassword()" />
        <button type="button" (click)="showPass.set(!showPass())"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
          <span class="material-icons-round text-xl">{{ showPass() ? 'visibility_off' : 'visibility' }}</span>
        </button>
      </div>

      <button class="btn-primary" (click)="loginWithPassword()"
        [disabled]="entering() || !username() || !password()">
        @if (entering()) { <div class="spinner"></div> } @else { <span class="material-icons-round">login</span> }
        Entrar
      </button>
    </div>
  }
</div>
