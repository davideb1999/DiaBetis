services:
  - type: web
    name: diabetis
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install --legacy-peer-deps --include=dev && npx ng build --configuration=production && cd ../backend && npm install --include=dev && npm run build
    startCommand: node backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: diabetis-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads

databases:
  - name: diabetis-db
    plan: free
